services:
  # Frontend (Nuxt)
  - type: web
    name: nuxt-blog-frontend
    env: node
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm preview
    envVars:
      - key: PAYLOAD_URL
        sync: false
      - key: SITE_URL
        sync: false

  # CMS (Payload)
  - type: web
    name: nuxt-blog-cms
    env: node
    rootDir: cms
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nuxt-blog-db
          property: connectionString
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: nuxt-blog-db
    plan: free
    databaseName: payload
    user: payload
